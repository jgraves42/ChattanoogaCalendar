name: Scrape Events

on:
  schedule:
    # Every Monday at 8:00 AM UTC (3:00 AM Eastern)
    - cron: '0 8 * * 1'

  # Allows you to trigger this manually from the GitHub Actions tab
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit data/events.json back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run scraper
        run: python scripts/scraper.py

      - name: Commit updated events.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: weekly event data update [skip ci]"
          file_pattern: data/events.js
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
